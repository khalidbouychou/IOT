
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: khbouych-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/khalidbouychou/iot-p3.git' # Your Public Repo
    targetRevision: HEAD
    path: ./  # Looks for deployment.yaml in the root of the repo
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true