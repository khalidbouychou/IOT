apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bonus-khbouych
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'http://209.38.231.135/root/khbouych.git' 
    targetRevision: HEAD
    path: ./
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true